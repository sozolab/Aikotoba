<script>
var db = null;
var currentUser = null;
var allUsers = [];
var matches = [];
var globalTopN = 5;
var locationWatchId = null;
var unsubUsers = null;
var unsubMatches = null;

var DEFAULT_FIREBASE_CONFIG = {
  apiKey: "AIzaSyBMUavNpoos9l8kzcpJ3JwHVjdCYgtIo6w",
  authDomain: "aikotoba-f297b.firebaseapp.com",
  projectId: "aikotoba-f297b",
  storageBucket: "aikotoba-f297b.firebasestorage.app",
  messagingSenderId: "82772155270",
  appId: "1:82772155270:web:37fc7d2b6eb497b5d4ea07"
};

function saveFirebaseConfig() {
  var apiKey = document.getElementById('cfg-apiKey').value.trim();
  var authDomain = document.getElementById('cfg-authDomain').value.trim();
  var projectId = document.getElementById('cfg-projectId').value.trim();
  if (!apiKey || !projectId) { alert('API KeyгҒЁProject IDгҒҜеҝ…й ҲгҒ§гҒҷ'); return; }
  var config = { apiKey: apiKey, authDomain: authDomain || projectId + '.firebaseapp.com', projectId: projectId };
  localStorage.setItem('aikotoba_firebase', JSON.stringify(config));
  initFirebase(config);
}

function initFirebase(config) {
  try {
    if (!firebase.apps.length) { firebase.initializeApp(config); }
    db = firebase.firestore();
    var saved = localStorage.getItem('aikotoba_user');
    if (saved) {
      currentUser = JSON.parse(saved);
      startApp();
    } else {
      showScreenOnly('register');
    }
  } catch (e) { alert('FirebaseжҺҘз¶ҡгӮЁгғ©гғј: ' + e.message); }
}

function register() {
  var name = document.getElementById('reg-name').value.trim();
  var affiliation = document.getElementById('reg-affiliation').value.trim();
  var interests = document.getElementById('reg-interests').value.trim();
  var appearance = document.getElementById('reg-appearance').value.trim();
  var aikotoba = document.getElementById('reg-aikotoba').value.trim();
  if (!name || !affiliation || !interests || !aikotoba) { alert('*гҒ®й …зӣ®гҒҜеҝ…й ҲгҒ§гҒҷ'); return; }
  var userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
  var userData = {
    name: name, affiliation: affiliation, interests: interests,
    appearance: appearance, aikotoba: aikotoba,
    location: null,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  db.collection('users').doc(userId).set(userData).then(function() {
    currentUser = {
      id: userId, name: name, affiliation: affiliation,
      interests: interests, appearance: appearance, aikotoba: aikotoba, location: null
    };
    localStorage.setItem('aikotoba_user', JSON.stringify(currentUser));
    startApp();
  }).catch(function(e) { alert('зҷ»йҢІгӮЁгғ©гғј: ' + e.message); });
}

function editProfile() {
  document.getElementById('reg-name').value = currentUser.name || '';
  document.getElementById('reg-affiliation').value = currentUser.affiliation || '';
  document.getElementById('reg-interests').value = currentUser.interests || '';
  document.getElementById('reg-appearance').value = currentUser.appearance || '';
  document.getElementById('reg-aikotoba').value = currentUser.aikotoba || '';
  showScreenOnly('register');
  document.getElementById('profile-toggle-btn').style.display = 'none';
  var btn = document.querySelector('#screen-register .btn-primary');
  btn.textContent = 'жӣҙж–°';
  btn.onclick = updateProfile;
}

function updateProfile() {
  var name = document.getElementById('reg-name').value.trim();
  var affiliation = document.getElementById('reg-affiliation').value.trim();
  var interests = document.getElementById('reg-interests').value.trim();
  var appearance = document.getElementById('reg-appearance').value.trim();
  var aikotoba = document.getElementById('reg-aikotoba').value.trim();
  if (!name || !affiliation || !interests || !aikotoba) { alert('*гҒ®й …зӣ®гҒҜеҝ…й ҲгҒ§гҒҷ'); return; }
  var updates = {
    name: name, affiliation: affiliation, interests: interests,
    appearance: appearance, aikotoba: aikotoba,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  db.collection('users').doc(currentUser.id).update(updates).then(function() {
    currentUser.name = name;
    currentUser.affiliation = affiliation;
    currentUser.interests = interests;
    currentUser.appearance = appearance;
    currentUser.aikotoba = aikotoba;
    localStorage.setItem('aikotoba_user', JSON.stringify(currentUser));
    startApp();
  }).catch(function(e) { alert('жӣҙж–°гӮЁгғ©гғј: ' + e.message); });
}

function logout() {
  if (!confirm('гғӯгӮ°гӮўгӮҰгғҲгҒ—гҒҫгҒҷгҒӢпјҹ')) return;
  if (unsubUsers) unsubUsers();
  if (unsubMatches) unsubMatches();
  if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
  localStorage.removeItem('aikotoba_user');
  currentUser = null;
  document.getElementById('profile-toggle-btn').style.display = 'none';
  showScreenOnly('register');
  var btn = document.querySelector('#screen-register .btn-primary');
  btn.textContent = 'зҷ»йҢІгҒ—гҒҰе§ӢгӮҒгӮӢ';
  btn.onclick = register;
  document.getElementById('reg-name').value = '';
  document.getElementById('reg-affiliation').value = '';
  document.getElementById('reg-interests').value = '';
  document.getElementById('reg-appearance').value = '';
  document.getElementById('reg-aikotoba').value = '';
}

function startApp() {
  document.getElementById('profile-toggle-btn').style.display = 'flex';
  showScreenOnly('main');
  startLocationTracking();
  listenUsers();
  listenMatches();
  renderProfile();
}

function toggleProfile() {
  var panel = document.getElementById('profile-panel');
  panel.classList.toggle('open');
  renderProfile();
}

function startLocationTracking() {
  if (!navigator.geolocation) return;
  locationWatchId = navigator.geolocation.watchPosition(function(pos) {
    var loc = new firebase.firestore.GeoPoint(pos.coords.latitude, pos.coords.longitude);
    db.collection('users').doc(currentUser.id).update({
      location: loc,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    currentUser.location = { latitude: pos.coords.latitude, longitude: pos.coords.longitude };
  }, function(err) {
    console.warn('Location error:', err.message);
  }, { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 });
}

function tokenize(text) {
  return text.toLowerCase().replace(/[гҖҒ,пјҢгҖӮпјҺ.гғ»\s]+/g, ' ').split(' ').filter(function(t) { return t.length > 0; });
}

function similarity(text1, text2) {
  var tokens1 = tokenize(text1);
  var tokens2 = tokenize(text2);
  if (tokens1.length === 0 || tokens2.length === 0) return 0;
  var matchCount = 0;
  for (var i = 0; i < tokens1.length; i++) {
    for (var j = 0; j < tokens2.length; j++) {
      if (tokens1[i] === tokens2[j]) { matchCount++; break; }
      if (tokens1[i].length >= 2 && tokens2[j].length >= 2) {
        if (tokens1[i].indexOf(tokens2[j]) >= 0 || tokens2[j].indexOf(tokens1[i]) >= 0) {
          matchCount += 0.5; break;
        }
      }
    }
  }
  return matchCount / Math.max(tokens1.length, tokens2.length);
}

function haversineDistance(loc1, loc2) {
  if (!loc1 || !loc2) return Infinity;
  var R = 6371000;
  var toRad = function(d) { return d * Math.PI / 180; };
  var dLat = toRad(loc2.latitude - loc1.latitude);
  var dLon = toRad(loc2.longitude - loc1.longitude);
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(toRad(loc1.latitude)) * Math.cos(toRad(loc2.latitude)) *
    Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function formatDist(dist) {
  if (dist >= Infinity) return '';
  if (dist < 10) return 'гҒҷгҒҗиҝ‘гҒҸ';
  if (dist < 50) return 'зҙ„' + Math.round(dist / 10) * 10 + 'm';
  if (dist < 200) return 'зҙ„' + Math.round(dist / 50) * 50 + 'm';
  if (dist < 1000) return 'зҙ„' + Math.round(dist / 100) * 100 + 'm';
  return 'зҙ„' + (dist / 1000).toFixed(1) + 'km';
}

function listenUsers() {
  if (unsubUsers) unsubUsers();
  unsubUsers = db.collection('users').onSnapshot(function(snap) {
    allUsers = [];
    snap.forEach(function(doc) {
      if (doc.id === currentUser.id) return;
      var data = doc.data();
      if (data.name === currentUser.name &&
          data.affiliation === currentUser.affiliation &&
          data.aikotoba === currentUser.aikotoba) return;
      data.id = doc.id;
      allUsers.push(data);
    });
    renderMain();
    checkProximityNotifications();
  });
}

function listenMatches() {
  if (unsubMatches) unsubMatches();
  unsubMatches = db.collection('matches')
    .where('participants', 'array-contains', currentUser.id)
    .onSnapshot(function(snap) {
      matches = [];
      snap.forEach(function(doc) {
        var d = doc.data();
        d.id = doc.id;
        matches.push(d);
      });
      renderMain();
    });
}

function submitAikotoba(targetUserId) {
  var input = document.getElementById('aikotoba-' + targetUserId);
  if (!input) return;
  var entered = input.value.trim();
  if (!entered) { alert('еҗҲиЁҖи‘үгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return; }

  var targetUser = null;
  for (var i = 0; i < allUsers.length; i++) {
    if (allUsers[i].id === targetUserId) { targetUser = allUsers[i]; break; }
  }
  if (!targetUser) { alert('гғҰгғјгӮ¶гғјгҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“'); return; }

  var isCorrect = entered === targetUser.aikotoba;
  if (isCorrect) {
    var ids = [currentUser.id, targetUserId].sort();
    var matchId = ids.join('_');
    var alreadyMatched = false;
    for (var j = 0; j < matches.length; j++) {
      if (matches[j].id === matchId) { alreadyMatched = true; break; }
    }
    if (!alreadyMatched) {
      db.collection('matches').doc(matchId).set({
        user1: currentUser.id,
        user2: targetUserId,
        participants: [currentUser.id, targetUserId],
        matchedBy: currentUser.id,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function() {
        showNotification('гғһгғғгғҒжҲҗз«ӢпјҒ' + targetUser.name + 'гҒ•гӮ“гҒЁгҒӨгҒӘгҒҢгӮҠгҒҫгҒ—гҒҹпјҒ');
      }).catch(function(e) { alert('гӮЁгғ©гғј: ' + e.message); });
    }
  } else {
    showNotification('еҗҲиЁҖи‘үгҒҢйҒ•гҒ„гҒҫгҒҷгҖӮгӮӮгҒҶдёҖеәҰи©ҰгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');
  }
  input.value = '';
}

var notifiedUsers = {};

function checkProximityNotifications() {
  if (!currentUser.location) return;
  var similarUsers = getSimilarUsers();
  for (var i = 0; i < similarUsers.length; i++) {
    var u = similarUsers[i];
    if (!u.location || notifiedUsers[u.id]) continue;
    var dist = haversineDistance(currentUser.location, u.location);
    if (dist < 50) {
      notifiedUsers[u.id] = true;
      showNotification(u.name + 'гҒ•гӮ“пјҲ' + u.affiliation + 'пјүгҒҢиҝ‘гҒҸгҒ«гҒ„гҒҫгҒҷпјҒгҖҢ' + (u.appearance || '') + 'гҖҚ');
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('Aikotoba', {
          body: u.name + 'гҒ•гӮ“гҒҢиҝ‘гҒҸгҒ«гҒ„гҒҫгҒҷпјҒ' + (u.appearance ? ' ' + u.appearance : '')
        });
      }
    }
  }
}

function getSimilarUsers() {
  var topNEl = document.getElementById('topN');
  var topN = topNEl ? parseInt(topNEl.value) : globalTopN;
  var result = [];
  for (var i = 0; i < allUsers.length; i++) {
    var u = allUsers[i];
    var sim = similarity(currentUser.interests || '', u.interests || '');
    if (sim <= 0) continue;
    var dist = haversineDistance(currentUser.location, u.location);
    var sameAff = (currentUser.affiliation || '').trim() === (u.affiliation || '').trim();
    result.push({
      id: u.id, name: u.name, affiliation: u.affiliation,
      interests: u.interests, appearance: u.appearance,
      aikotoba: u.aikotoba, location: u.location,
      sim: sim, dist: dist, sameAffiliation: sameAff
    });
  }
  result.sort(function(a, b) {
    if (a.sameAffiliation !== b.sameAffiliation) return a.sameAffiliation ? 1 : -1;
    return b.sim - a.sim;
  });
  return result.slice(0, topN);
}

function renderMain() {
  renderMatchedSection();
  renderDiscovery();
}

function renderMatchedSection() {
  var container = document.getElementById('matched-section');
  if (!container) return;
  if (matches.length === 0) { container.innerHTML = ''; return; }

  var html = '<div class="section-title">гғһгғғгғҒжёҲгҒҝ</div>';
  for (var i = 0; i < matches.length; i++) {
    var m = matches[i];
    var otherId = m.user1 === currentUser.id ? m.user2 : m.user1;
    var other = null;
    for (var j = 0; j < allUsers.length; j++) {
      if (allUsers[j].id === otherId) { other = allUsers[j]; break; }
    }
    if (!other) continue;
    var dist = haversineDistance(currentUser.location, other.location);
    var distText = formatDist(dist);
    html += '<div class="user-card">' +
      '<div class="match-status matched" style="margin:0 0 8px 0">гғһгғғгғҒжҲҗз«ӢпјҒ</div>' +
      (distText ? '<span class="distance" style="float:right;margin-top:0;">' + distText + '</span>' : '') +
      '<div class="name">' + escHtml(other.name) + '</div>' +
      '<span class="affiliation">' + escHtml(other.affiliation) + '</span>' +
      '<div class="interests">' + escHtml(other.interests) + '</div>' +
      (other.appearance ? '<div class="appearance">' + escHtml(other.appearance) + '</div>' : '') +
      '</div>';
  }
  container.innerHTML = html;
}

function renderDiscovery() {
  var container = document.getElementById('similar-users');
  if (!container) return;
  var users = getSimilarUsers();
  var unmatchedUsers = [];
  for (var i = 0; i < users.length; i++) {
    var matched = false;
    for (var j = 0; j < matches.length; j++) {
      if (matches[j].participants && matches[j].participants.indexOf(users[i].id) >= 0) {
        matched = true; break;
      }
    }
    if (!matched) unmatchedUsers.push(users[i]);
  }

  if (unmatchedUsers.length === 0 && matches.length === 0) {
    container.innerHTML = '<div class="empty-state">' +
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#a0aec0" stroke-width="2">' +
      '<circle cx="12" cy="12" r="10"/>' +
      '<path d="M8 14s1.5 2 4 2 4-2 4-2"/>' +
      '<line x1="9" y1="9" x2="9.01" y2="9"/>' +
      '<line x1="15" y1="9" x2="15.01" y2="9"/>' +
      '</svg>' +
      '<p>гҒҫгҒ иҲҲе‘ігҒҢиҝ‘гҒ„дәәгҒҢгҒ„гҒҫгҒӣгӮ“</p>' +
      '<p style="font-size:0.8em">еҸӮеҠ иҖ…гҒҢеў—гҒҲгӮӢгҒ®гӮ’еҫ…гҒЎгҒҫгҒ—гӮҮгҒҶ</p></div>';
    return;
  }

  if (unmatchedUsers.length === 0) { container.innerHTML = ''; return; }

  var html = matches.length > 0 ? '<div class="section-title">зҷәиҰӢ</div>' : '';
  for (var k = 0; k < unmatchedUsers.length; k++) {
    var u = unmatchedUsers[k];
    var simPercent = Math.round(u.sim * 100);
    var distText = formatDist(u.dist);
    html += '<div class="user-card">' +
      '<span class="similarity">' + simPercent + '% йЎһдјј</span>' +
      (distText ? '<span class="distance">' + distText + '</span>' : '') +
      '<div class="name">' + escHtml(u.name) + '</div>' +
      '<span class="affiliation">' + escHtml(u.affiliation) + '</span>' +
      '<div class="interests">' + escHtml(u.interests) + '</div>' +
      (u.appearance ? '<div class="appearance">' + escHtml(u.appearance) + '</div>' : '') +
      '<div class="aikotoba-input-row">' +
      '<input type="text" id="aikotoba-' + u.id + '" placeholder="' + escHtml(u.name) + 'гҒ•гӮ“гҒ®еҗҲиЁҖи‘ү">' +
      "<button class=\"btn btn-sm btn-success\" onclick=\"submitAikotoba('" + u.id + "')\">йҖҒдҝЎ</button>" +
      '</div></div>';
  }
  container.innerHTML = html;
}

function renderProfile() {
  var container = document.getElementById('my-profile');
  if (!currentUser || !container) return;
  container.innerHTML =
    '<p><strong>еҗҚеүҚ:</strong> ' + escHtml(currentUser.name) + '</p>' +
    '<p><strong>жүҖеұһ:</strong> ' + escHtml(currentUser.affiliation) + '</p>' +
    '<p><strong>иҲҲе‘і:</strong> ' + escHtml(currentUser.interests) + '</p>' +
    '<p><strong>зү№еҫҙ:</strong> ' + escHtml(currentUser.appearance || 'жңӘиЁӯе®ҡ') + '</p>' +
    '<p><strong>еҗҲиЁҖи‘ү:</strong> ' + escHtml(currentUser.aikotoba) + '</p>';
}

function updateTopN() { renderMain(); }

function showScreenOnly(name) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  document.getElementById('screen-' + name).classList.add('active');
}

function showNotification(msg) {
  var el = document.getElementById('notification');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 4000);
}

function escHtml(str) {
  var div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

window.addEventListener('DOMContentLoaded', function() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  var saved = localStorage.getItem('aikotoba_firebase');
  if (saved) { initFirebase(JSON.parse(saved)); }
  else { initFirebase(DEFAULT_FIREBASE_CONFIG); }
});
</script>
