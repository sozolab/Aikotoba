<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aikotoba - 合言葉</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header h1 { font-size: 1.4em; }
    .header small { opacity: 0.85; font-size: 0.75em; }
    .screen { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
    .screen.active { display: block; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 1.1em; margin-bottom: 12px; color: #4a5568; }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 0.85em;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 4px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      width: 100%;
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm {
      padding: 8px 16px;
      font-size: 0.85em;
    }
    .btn-outline {
      background: white;
      border: 1.5px solid #667eea;
      color: #667eea;
    }
    .btn-success {

    }
    .btn-danger {

    .user-card {

<div id="notification" class="notification-bar"></div>

<!-- Setup / Firebase Config Screen -->

        <input type="text" id="cfg-apiKey" placeholder="AIza...">

      <div class="form-group">

      <div class="form-group">
        <label>Project ID</label>

      </div>

    <div class="form-group">

      <label>興味・発表タイトル *</label>

    </div>

<!-- Dashboard Screen -->

        <option value="3">Top 3</option>

</div>

<!-- Match Screen -->

<!-- Tab Bar -->

  <button onclick="showScreen('dashboard')" id="tab-dashboard" class="active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>

    マッチ<span id="match-badge"></span>
  </button>
  <button onclick="showScreen('profile')" id="tab-profile">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    プロフィール

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
let db = null;
let currentUser = null;
let allUsers = [];
let matchRequests = [];
let matches = [];
let globalTopN = 5;
let locationWatchId = null;
let unsubUsers = null;
let unsubRequests = null;
let unsubMatches = null;

// --- Default Firebase Config ---
const DEFAULT_FIREBASE_CONFIG = {
  apiKey: "AIzaSyBMUavNpoos9l8kzcpJ3JwHVjdCYgtIo6w",
  authDomain: "aikotoba-f297b.firebaseapp.com",
  projectId: "aikotoba-f297b",
  storageBucket: "aikotoba-f297b.firebasestorage.app",
  messagingSenderId: "82772155270",
  appId: "1:82772155270:web:37fc7d2b6eb497b5d4ea07"
};

function saveFirebaseConfig() {
  const apiKey = document.getElementById('cfg-apiKey').value.trim();
  const authDomain = document.getElementById('cfg-authDomain').value.trim();
  const projectId = document.getElementById('cfg-projectId').value.trim();
  if (!apiKey || !projectId) {
    alert('API KeyとProject IDは必須です');
    return;
  }
  const config = { apiKey, authDomain: authDomain || projectId + '.firebaseapp.com', projectId };
  localStorage.setItem('aikotoba_firebase', JSON.stringify(config));
  initFirebase(config);
}

function initFirebase(config) {
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(config);
    }
    db = firebase.firestore();
    const saved = localStorage.getItem('aikotoba_user');
    if (saved) {
      currentUser = JSON.parse(saved);
      startApp();
    } else {
      showScreenOnly('register');
    }
  } catch (e) {
    alert('Firebase接続エラー: ' + e.message);
  }
}

// --- Registration ---
function register() {
  const name = document.getElementById('reg-name').value.trim();
  const affiliation = document.getElementById('reg-affiliation').value.trim();
  const interests = document.getElementById('reg-interests').value.trim();
  const appearance = document.getElementById('reg-appearance').value.trim();
  const aikotoba = document.getElementById('reg-aikotoba').value.trim();
  if (!name || !affiliation || !interests || !aikotoba) {
    alert('*の項目は必須です');
    return;
  }
  const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
  const userData = {
    name, affiliation, interests, appearance, aikotoba,
    location: null,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  db.collection('users').doc(userId).set(userData).then(() => {
    currentUser = { id: userId, ...userData };
    localStorage.setItem('aikotoba_user', JSON.stringify(currentUser));
    startApp();
  }).catch(e => alert('登録エラー: ' + e.message));
}

function editProfile() {
  document.getElementById('reg-name').value = currentUser.name || '';
  document.getElementById('reg-affiliation').value = currentUser.affiliation || '';
  document.getElementById('reg-interests').value = currentUser.interests || '';
  document.getElementById('reg-appearance').value = currentUser.appearance || '';
  document.getElementById('reg-aikotoba').value = currentUser.aikotoba || '';
  showScreenOnly('register');
  const btn = document.querySelector('#screen-register .btn-primary');
  btn.textContent = '更新';
  btn.onclick = updateProfile;
}

function updateProfile() {
  const name = document.getElementById('reg-name').value.trim();
  const affiliation = document.getElementById('reg-affiliation').value.trim();
  const interests = document.getElementById('reg-interests').value.trim();
  const appearance = document.getElementById('reg-appearance').value.trim();
  const aikotoba = document.getElementById('reg-aikotoba').value.trim();
  if (!name || !affiliation || !interests || !aikotoba) {
    alert('*の項目は必須です');
    return;
  }
  const updates = {
    name, affiliation, interests, appearance, aikotoba,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  db.collection('users').doc(currentUser.id).update(updates).then(() => {
    Object.assign(currentUser, updates);
    localStorage.setItem('aikotoba_user', JSON.stringify(currentUser));
    startApp();
  }).catch(e => alert('更新エラー: ' + e.message));
}

function logout() {
  if (!confirm('ログアウトしますか？')) return;
  if (unsubUsers) unsubUsers();
  if (unsubRequests) unsubRequests();
  if (unsubMatches) unsubMatches();
  if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
  localStorage.removeItem('aikotoba_user');
  currentUser = null;
  document.getElementById('tab-bar').style.display = 'none';
  showScreenOnly('register');
  const btn = document.querySelector('#screen-register .btn-primary');
  btn.textContent = '登録して始める';
  btn.onclick = register;
  document.getElementById('reg-name').value = '';
  document.getElementById('reg-affiliation').value = '';
  document.getElementById('reg-interests').value = '';
  document.getElementById('reg-appearance').value = '';
  document.getElementById('reg-aikotoba').value = '';
}

// --- App Start ---
function startApp() {
  document.getElementById('tab-bar').style.display = 'flex';
  showScreen('dashboard');
  startLocationTracking();
  listenUsers();
  listenMatchRequests();
  listenMatches();
  renderProfile();
}

// --- Location ---
function startLocationTracking() {
  if (!navigator.geolocation) return;
  locationWatchId = navigator.geolocation.watchPosition(pos => {
    const loc = new firebase.firestore.GeoPoint(pos.coords.latitude, pos.coords.longitude);
    db.collection('users').doc(currentUser.id).update({
      location: loc,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    currentUser.location = { latitude: pos.coords.latitude, longitude: pos.coords.longitude };
  }, err => {
    console.warn('Location error:', err.message);
  }, { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 });
}

// --- Interest Similarity ---
function tokenize(text) {
  return text.toLowerCase()
    .replace(/[、,，。．.・\s]+/g, ' ')
    .split(' ')
    .filter(t => t.length > 0);
}

function similarity(text1, text2) {
  const tokens1 = tokenize(text1);
  const tokens2 = tokenize(text2);
  if (tokens1.length === 0 || tokens2.length === 0) return 0;

  let matchCount = 0;
  for (const t1 of tokens1) {
    for (const t2 of tokens2) {
      if (t1 === t2) { matchCount++; break; }
      if (t1.length >= 2 && t2.length >= 2 && (t1.includes(t2) || t2.includes(t1))) {
        matchCount += 0.5;
        break;
      }
    }
  }
  return matchCount / Math.max(tokens1.length, tokens2.length);
}

function haversineDistance(loc1, loc2) {
  if (!loc1 || !loc2) return Infinity;
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(loc2.latitude - loc1.latitude);
  const dLon = toRad(loc2.longitude - loc1.longitude);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(loc1.latitude)) * Math.cos(toRad(loc2.latitude)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// --- Firestore Listeners ---
function listenUsers() {
  if (unsubUsers) unsubUsers();
  unsubUsers = db.collection('users').onSnapshot(snap => {
    allUsers = [];
    snap.forEach(doc => {
      if (doc.id !== currentUser.id) {
        const data = doc.data();
        allUsers.push({ id: doc.id, ...data });
      }
    });
    renderDashboard();
    checkProximityNotifications();
  });
}

function listenMatchRequests() {
  if (unsubRequests) unsubRequests();
  unsubRequests = db.collection('match_requests')
    .where('participants', 'array-contains', currentUser.id)
    .onSnapshot(snap => {
      matchRequests = [];
      snap.forEach(doc => {
        matchRequests.push({ id: doc.id, ...doc.data() });
      });
      renderMatchScreen();
      checkForCompletedMatches();
    });
}

function listenMatches() {
  if (unsubMatches) unsubMatches();
  unsubMatches = db.collection('matches')
    .where('participants', 'array-contains', currentUser.id)
    .onSnapshot(snap => {
      matches = [];
      snap.forEach(doc => {
        matches.push({ id: doc.id, ...doc.data() });
      });
      renderMatchScreen();
      updateMatchBadge();
    });
}

// --- Match Logic ---
function submitAikotoba(targetUserId) {
  const input = document.getElementById('aikotoba-' + targetUserId);
  if (!input) return;
  const entered = input.value.trim();
  if (!entered) { alert('合言葉を入力してください'); return; }

  const targetUser = allUsers.find(u => u.id === targetUserId);
  if (!targetUser) { alert('ユーザーが見つかりません'); return; }

  const isCorrect = entered === targetUser.aikotoba;

  const requestId = [currentUser.id, targetUserId].sort().join('_');

  db.collection('match_requests').doc(requestId).get().then(doc => {
    if (doc.exists) {
      const existing = doc.data();
      const updates = {};
      if (existing.fromUserId === currentUser.id) {
        updates.fromCorrect = isCorrect;
        updates.fromWord = entered;
      } else {
        updates.toCorrect = isCorrect;
        updates.toWord = entered;
      }
      updates.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
      return db.collection('match_requests').doc(requestId).update(updates);
    } else {
      return db.collection('match_requests').doc(requestId).set({
        fromUserId: currentUser.id,
        toUserId: targetUserId,
        participants: [currentUser.id, targetUserId],
        fromWord: entered,
        fromCorrect: isCorrect,
        toWord: null,
        toCorrect: null,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
  }).then(() => {
    input.value = '';
    if (isCorrect) {
      showNotification('合言葉が正しいです！相手の入力を待っています...');
    } else {
      showNotification('合言葉が違います。もう一度試してください。');
    }
  }).catch(e => alert('エラー: ' + e.message));
}

function checkForCompletedMatches() {
  matchRequests.forEach(req => {
    if (req.fromCorrect && req.toCorrect) {
      const matchId = [req.fromUserId, req.toUserId].sort().join('_');
      const alreadyMatched = matches.some(m => m.id === matchId);
      if (!alreadyMatched) {
        db.collection('matches').doc(matchId).set({
          user1: req.fromUserId,
          user2: req.toUserId,
          participants: [req.fromUserId, req.toUserId],
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
          showNotification('マッチ成立！おめでとうございます！');
        });
      }
    }
  });
}

// --- Proximity ---
let notifiedUsers = new Set();

function checkProximityNotifications() {
  if (!currentUser.location) return;
  const PROXIMITY_METERS = 50;

  const similarUsers = getSimilarUsers();
  similarUsers.forEach(u => {
    if (!u.location || notifiedUsers.has(u.id)) return;
    const dist = haversineDistance(currentUser.location, u.location);
    if (dist < PROXIMITY_METERS) {
      notifiedUsers.add(u.id);
      showNotification(u.name + 'さん（' + u.affiliation + '）が近くにいます！「' + u.appearance + '」');
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('Aikotoba', {
          body: u.name + 'さんが近くにいます！' + (u.appearance ? ' ' + u.appearance : ''),
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🤝</text></svg>'
        });
      }
    }
  });
}

// --- Rendering ---
function getSimilarUsers() {
  const topN = parseInt(document.getElementById('topN')?.value || globalTopN);
  return allUsers
    .map(u => ({
      ...u,
      sim: similarity(currentUser.interests || '', u.interests || ''),
      dist: haversineDistance(currentUser.location, u.location),
      sameAffiliation: (currentUser.affiliation || '').trim() === (u.affiliation || '').trim()
    }))
    .filter(u => u.sim > 0)
    .sort((a, b) => {
      if (a.sameAffiliation !== b.sameAffiliation) return a.sameAffiliation ? 1 : -1;
      return b.sim - a.sim;
    })
    .slice(0, topN);
}

function renderDashboard() {
  const container = document.getElementById('similar-users');
  const users = getSimilarUsers();

  if (users.length === 0) {
    container.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#a0aec0" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg><p>まだ興味が近い人がいません</p><p style="font-size:0.8em">参加者が増えるのを待ちましょう</p></div>';
    return;
  }

  container.innerHTML = users.map(u => {
    const simPercent = Math.round(u.sim * 100);
    const distText = u.dist < Infinity ? (u.dist < 1000 ? Math.round(u.dist) + 'm' : (u.dist/1000).toFixed(1) + 'km') : '';
    const matchReq = matchRequests.find(r => r.participants && r.participants.includes(u.id));
    const isMatched = matches.some(m => m.participants && m.participants.includes(u.id));

    let statusHtml = '';
    if (isMatched) {
      statusHtml = '<div class="match-status matched">マッチ済み！</div>';
    } else if (matchReq) {
      const iSent = matchReq.fromUserId === currentUser.id;
      const myCorrect = iSent ? matchReq.fromCorrect : matchReq.toCorrect;
      const theirCorrect = iSent ? matchReq.toCorrect : matchReq.fromCorrect;
      if (myCorrect && !theirCorrect) {
        statusHtml = '<div class="match-status waiting">あなたの合言葉は正解！相手の入力待ち...</div>';
      } else if (!myCorrect && theirCorrect) {
        statusHtml = '<div class="match-status pending">相手が正解済み！あなたの番です</div>';
      } else if (myCorrect === false) {
        statusHtml = '<div class="match-status" style="background:#fed7d7;color:#9b2c2c;">合言葉が違いました。再入力してください</div>';
      }
    }

    let aikotobaHtml = '';
    if (!isMatched) {
      aikotobaHtml = '<div class="aikotoba-input-row"><input type="text" id="aikotoba-' + u.id + '" placeholder="' + u.name + 'さんの合言葉"><button class="btn btn-sm btn-success" onclick="submitAikotoba(\'' + u.id + '\')">送信</button></div>';
    }

    return '<div class="user-card">' +
      '<span class="similarity">' + simPercent + '% 類似' + (distText ? ' / ' + distText : '') + '</span>' +
      '<div class="name">' + escHtml(u.name) + '</div>' +
      '<span class="affiliation">' + escHtml(u.affiliation) + '</span>' +
      '<div class="interests">' + escHtml(u.interests) + '</div>' +
      (u.appearance ? '<div class="appearance">' + escHtml(u.appearance) + '</div>' : '') +
      statusHtml +
      aikotobaHtml +
      '</div>';
  }).join('');
}

function renderMatchScreen() {
  const container = document.getElementById('match-list');

  const pendingReqs = matchRequests.filter(r => {
    const matchId = [r.fromUserId, r.toUserId].sort().join('_');
    return !matches.some(m => m.id === matchId);
  });

  let html = '';

  if (matches.length > 0) {
    html += '<div class="card"><h2>マッチ済み</h2></div>';
    matches.forEach(m => {
      const otherId = m.user1 === currentUser.id ? m.user2 : m.user1;
      const other = allUsers.find(u => u.id === otherId);
      if (other) {
        html += '<div class="user-card">' +
          '<div class="match-status matched" style="margin:0 0 8px 0">マッチ成立！</div>' +
          '<div class="name">' + escHtml(other.name) + '</div>' +
          '<span class="affiliation">' + escHtml(other.affiliation) + '</span>' +
          '<div class="interests">' + escHtml(other.interests) + '</div>' +
          (other.appearance ? '<div class="appearance">' + escHtml(other.appearance) + '</div>' : '') +
          '</div>';
      }
    });
  }

  if (pendingReqs.length > 0) {
    html += '<div class="card"><h2>申請中</h2></div>';
    pendingReqs.forEach(r => {
      const otherId = r.fromUserId === currentUser.id ? r.toUserId : r.fromUserId;
      const other = allUsers.find(u => u.id === otherId);
      if (!other) return;
      const iSent = r.fromUserId === currentUser.id;
      const myCorrect = iSent ? r.fromCorrect : r.toCorrect;
      const theirCorrect = iSent ? r.toCorrect : r.fromCorrect;

      let status = '';
      if (myCorrect && !theirCorrect) status = '<div class="match-status waiting">あなた: 正解 / 相手: 未入力</div>';
      else if (!myCorrect && theirCorrect) status = '<div class="match-status pending">相手: 正解 / あなた: 未入力</div>';
      else if (myCorrect === false) status = '<div class="match-status" style="background:#fed7d7;color:#9b2c2c;">合言葉が違いました</div>';

      let aikotobaHtml = '';
      if (!myCorrect) {
        aikotobaHtml = '<div class="aikotoba-input-row"><input type="text" id="aikotoba-' + other.id + '" placeholder="' + other.name + 'さんの合言葉"><button class="btn btn-sm btn-success" onclick="submitAikotoba(\'' + other.id + '\')">送信</button></div>';
      }

      html += '<div class="user-card">' +
        '<div class="name">' + escHtml(other.name) + '</div>' +
        '<span class="affiliation">' + escHtml(other.affiliation) + '</span>' +
        status + aikotobaHtml +
        '</div>';
    });
  }

  if (!html) {
    html = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#a0aec0" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><p>まだマッチはありません</p><p style="font-size:0.8em">興味が近い人を見つけて合言葉を交換しよう</p></div>';
  }

  container.innerHTML = html;
}

function renderProfile() {
  const container = document.getElementById('my-profile');
  if (!currentUser) return;
  container.innerHTML =
    '<p><strong>名前:</strong> ' + escHtml(currentUser.name) + '</p>' +
    '<p><strong>所属:</strong> ' + escHtml(currentUser.affiliation) + '</p>' +
    '<p><strong>興味:</strong> ' + escHtml(currentUser.interests) + '</p>' +
    '<p><strong>特徴:</strong> ' + escHtml(currentUser.appearance || '未設定') + '</p>' +
    '<p><strong>合言葉:</strong> ' + escHtml(currentUser.aikotoba) + '</p>';
}

function updateMatchBadge() {
  const badge = document.getElementById('match-badge');
  if (matches.length > 0) {
    badge.innerHTML = '<span class="badge">' + matches.length + '</span>';
  } else {
    badge.innerHTML = '';
  }
}

function updateTopN() {
  renderDashboard();
}

// --- Navigation ---
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  const tab = document.getElementById('tab-' + name);
  if (tab) tab.classList.add('active');
}

function showScreenOnly(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// --- Notification ---
function showNotification(msg) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

// --- Utility ---
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// --- Init ---
window.addEventListener('DOMContentLoaded', () => {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  const saved = localStorage.getItem('aikotoba_firebase');
  if (saved) {
    initFirebase(JSON.parse(saved));
  } else {
    initFirebase(DEFAULT_FIREBASE_CONFIG);
  }
});
</script>
